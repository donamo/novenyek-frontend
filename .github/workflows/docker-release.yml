name: Docker release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  docker:
    name: Build and push image
    runs-on: ubuntu-latest
    if: ${{ github.ref_type == 'tag' && github.ref_name != '' }}

    steps:
      - name: Validate version tag
        run: |
          if ! echo "${GITHUB_REF_NAME}" | grep -Eq '^v[0-9]+\.[0-9]+\.[0-9]+$'; then
            echo "Invalid tag: ${GITHUB_REF_NAME}. Expected format: v1.0.0"
            exit 1
          fi

      - name: Checkout
        uses: actions/checkout@v4

      - name: Set image name
        id: image
        run: |
          echo "name=${REGISTRY}/${IMAGE_NAME,,}" >> "${GITHUB_OUTPUT}"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push runner image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          target: runner
          push: true
          tags: ${{ steps.image.outputs.name }}:${{ github.ref_name }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
